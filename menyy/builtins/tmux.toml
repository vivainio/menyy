[t]
label = "tmux"

[t.k]
label = "kill other panes"
run = "tmux kill-pane -a"

[t.r]
label = "rename window"
prompt = "new window name"
run = "tmux rename-window {}"

[t.s]
label = "switch session"
pick = "tmux list-sessions -F '#S' | fzf"
run = "tmux switch-client -t {}"

[t.S]
label = "save tmux session snapshot"
run = "$MENYY --tmux-save"

[t.R]
label = "restore tmux session snapshot"
run = "$MENYY --tmux-restore"

[t.w]
label = "start/switch workspace (claude)"
run = """
name=$(basename "$PWD")
if ! tmux has-session -t "$name" 2>/dev/null; then
  if claude conversation list --limit 1 2>/dev/null | grep -q .; then
    cmd="claude --continue"
  else
    cmd="claude"
  fi
  tmux new-session -d -s "$name" -c "$PWD" -n "$name" "$cmd"
fi
if [ -n "$TMUX" ]; then
  tmux switch-client -t "$name"
else
  tmux attach-session -t "$name"
fi
"""
