[t]
label = "tmux"

[t.k]
label = "kill other panes"
run = "tmux kill-pane -a"

[t.r]
label = "rename window"
prompt = "new window name"
run = "tmux rename-window {}"

[t.s]
label = "switch session"
pick = "tmux list-sessions -F '#S' | fzf"
run = "tmux switch-client -t {}"

[t.w]
label = "start/switch workspace (claude)"
call = "menyy.tmux:workspace_launch"

[t.z]
label = "start/switch session in zoxide dir"
pick = "zoxide query -l | sed \"s|^$HOME|~|\" | fzf --prompt='zoxide> ' | sed \"s|^~|$HOME|\""
call = "menyy.tmux:workspace_launch"

[t.S]
label = "save tmux session snapshot"
call = "menyy.tmux:save"

[t.R]
label = "restore tmux session snapshot"
call = "menyy.tmux:restore"
