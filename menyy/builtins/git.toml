[g]
label = "git"

[g.b]
label = "copy current branch"
run = "git branch --show-current | tr -d '\\n' | $MENYY --copy"

[g.c]
label = "checkout branch"
pick = "git branch --format='%(refname:short)' | fzf"
run = "git checkout {}"

[g.s]
label = "status"
run = "git status"
keep_open = true

[g.l]
label = "log (last 20)"
run = "git log --oneline -20"
keep_open = true

[g.p]
label = "pull"
run = "git pull"
keep_open = true

[g.r]
label = "copy recent branch"
pick = "git for-each-ref --sort=-committerdate --format='%(refname:short)' refs/heads/ | fzf"
run = "printf '%s' {} | $MENYY --copy"
